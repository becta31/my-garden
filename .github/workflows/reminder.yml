name: Garden Reminder

on:
  schedule:
    # Запуск каждое утро в 06:00 UTC (примерно 09:00 МСК)
    - cron: '0 6 * * *'
  workflow_dispatch: # Ручной запуск для тестов

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false # Важно для коммитов от бота

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Garden Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        CITY_NAME: ${{ secrets.CITY_NAME }}
      run: python send_tasks.py

    # --- НОВЫЕ ШАГИ ДЛЯ СОХРАНЕНИЯ ПАМЯТИ ---
    
    - name: Check for changes
      id: check_changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add history.json last_weather.json
        # Проверяем, есть ли что коммитить
        if git diff --staged --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push changes
      if: steps.check_changes.outputs.has_changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git commit -m "Update history and weather data [skip ci]" -a
        git push
